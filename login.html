<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KnightFight Bot — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Open+Sans:wght@400;600&display=swap');
  :root {
    --bg:      #0d0d0f;
    --surface: #16161a;
    --border:  #2a2a30;
    --gold:    #c8943a;
    --gold2:   #e8b860;
    --text:    #d4c9b0;
    --muted:   #6b6455;
    --green2:  #6abf69;
    --red:     #c05050;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px 36px;
    width: 360px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .sub {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    margin-bottom: 18px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--gold); }
  button {
    width: 100%;
    background: rgba(200,148,58,0.15);
    border: 1px solid rgba(200,148,58,0.4);
    border-radius: 3px;
    color: var(--gold2);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 12px;
    cursor: pointer;
    transition: all .15s;
    text-transform: uppercase;
  }
  button:hover { background: rgba(200,148,58,0.25); }
  .btn-link {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Open Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0;
    padding: 8px;
    text-transform: none;
    text-decoration: underline;
    cursor: pointer;
  }
  .btn-link:hover { background: transparent; color: var(--gold); }
  .msg {
    font-size: 12px;
    text-align: center;
    margin-top: 14px;
    display: none;
    padding: 8px 12px;
    border-radius: 3px;
  }
  .msg.err  { color: var(--red);    background: rgba(192,80,80,0.1);  display: block; }
  .msg.ok   { color: var(--green2); background: rgba(106,191,105,0.1); display: block; }
  .sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }
  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚔ KnightFight Bot</div>
  <div class="sub" id="page-sub">Painel de Controle</div>

  <!-- Login -->
  <div class="panel active" id="panel-login">
    <label>Usuário</label>
    <input type="text" id="login-user" placeholder="usuário" autocomplete="username">
    <label>Senha</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <button onclick="login()">Entrar</button>
    <hr class="sep">
    <button class="btn-link" onclick="showPanel('register')">Criar nova conta</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Registro -->
  <div class="panel" id="panel-register">
    <label>Usuário</label>
    <input type="text" id="reg-user" placeholder="escolha um nome de usuário" autocomplete="username">
    <label>Senha</label>
    <input type="password" id="reg-pass" placeholder="mínimo 4 caracteres" autocomplete="new-password">
    <label>Confirmar Senha</label>
    <input type="password" id="reg-pass2" placeholder="repita a senha" autocomplete="new-password">
    <button onclick="register()">Criar Conta</button>
    <hr class="sep">
    <button class="btn-link" onclick="showPanel('login')">Já tenho conta — entrar</button>
    <div class="msg" id="reg-msg"></div>
  </div>
</div>
<script>
function showPanel(name){
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('page-sub').textContent = name === 'register' ? 'Criar Conta' : 'Painel de Controle';
  document.getElementById('login-msg').className = 'msg';
  document.getElementById('reg-msg').className = 'msg';
}

document.addEventListener('keydown', function(e){
  if(e.key !== 'Enter') return;
  if(document.getElementById('panel-login').classList.contains('active')) login();
  else register();
});

function showMsg(id, text, type){
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

function login(){
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value;
  if(!user || !pass) return;
  fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user: user, password: pass})
  })
  .then(r => r.json())
  .then(function(d){
    if(d.ok){ window.location.href = '/'; }
    else { showMsg('login-msg', d.error || 'Usuário ou senha inválidos', 'err'); }
  })
  .catch(function(){ showMsg('login-msg', 'Erro de conexão', 'err'); });
}

function register(){
  var user  = document.getElementById('reg-user').value.trim();
  var pass  = document.getElementById('reg-pass').value;
  var pass2 = document.getElementById('reg-pass2').value;
  if(!user || !pass || !pass2){ showMsg('reg-msg','Preencha todos os campos','err'); return; }
  if(pass !== pass2){ showMsg('reg-msg','As senhas não coincidem','err'); return; }
  if(pass.length < 4){ showMsg('reg-msg','Senha muito curta (mín. 4 caracteres)','err'); return; }
  fetch('/api/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({user: user, password: pass})
  })
  .then(r => r.json())
  .then(function(d){
    if(d.ok){ window.location.href = '/'; }
    else { showMsg('reg-msg', d.error || 'Erro ao criar conta', 'err'); }
  })
  .catch(function(){ showMsg('reg-msg', 'Erro de conexão', 'err'); });
}
</script>
</body>
</html>
